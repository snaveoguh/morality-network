<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 8-bit kawaii printer — early Mac OS / Clippy vibes -->
  <!-- Pixel grid: each "pixel" is 4x4 units -->

  <!-- Paper coming out the top -->
  <rect x="16" y="4" width="32" height="16" fill="#E8E4DC" stroke="#4A4A4A" stroke-width="1"/>
  <rect x="20" y="7" width="16" height="1" fill="#C8C0B0"/>
  <rect x="20" y="10" width="24" height="1" fill="#C8C0B0"/>
  <rect x="20" y="13" width="20" height="1" fill="#C8C0B0"/>
  <rect x="20" y="16" width="12" height="1" fill="#C8C0B0"/>

  <!-- Printer body — rounded square -->
  <rect x="8" y="18" width="48" height="32" rx="3" fill="#D4D0C8" stroke="#4A4A4A" stroke-width="1.5"/>

  <!-- Inner face panel -->
  <rect x="14" y="22" width="36" height="22" rx="2" fill="#E8E4DC" stroke="#8A8A8A" stroke-width="0.5"/>

  <!-- Left eye — square pixel, classic Mac -->
  <rect x="22" y="27" width="5" height="5" rx="0.5" fill="#1A1A1A"/>
  <!-- Eye highlight -->
  <rect x="23" y="28" width="2" height="2" fill="#E8E4DC"/>

  <!-- Right eye -->
  <rect x="37" y="27" width="5" height="5" rx="0.5" fill="#1A1A1A"/>
  <!-- Eye highlight -->
  <rect x="38" y="28" width="2" height="2" fill="#E8E4DC"/>

  <!-- Mouth — small happy line -->
  <path d="M28 37 Q32 40 36 37" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Paper feed slot -->
  <rect x="12" y="18" width="40" height="3" rx="1" fill="#8A8A8A"/>

  <!-- Feed tray at bottom -->
  <rect x="12" y="50" width="40" height="6" rx="2" fill="#C8C0B0" stroke="#4A4A4A" stroke-width="1"/>
  <rect x="16" y="52" width="32" height="2" rx="1" fill="#E8E4DC"/>

  <!-- Status light -->
  <circle cx="46" cy="24" r="2" fill="#6B8E6B" stroke="#4A4A4A" stroke-width="0.5"/>

  <!-- Side buttons -->
  <rect x="10" y="34" width="3" height="4" rx="1" fill="#8A8A8A"/>
  <rect x="51" y="34" width="3" height="4" rx="1" fill="#8A8A8A"/>
</svg>
