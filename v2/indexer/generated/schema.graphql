  feedItems(where: feedItemFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): feedItemPage!
  commentVote(id: String!): commentVote
  commentVotes(where: commentVoteFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): commentVotePage!
  scannerLaunch(id: String!): scannerLaunch
  scannerLaunchs(where: scannerLaunchFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): scannerLaunchPage!
  articleArchive(id: String!): articleArchive
  articleArchives(where: articleArchiveFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): articleArchivePage!
  editorialArchive(id: String!): editorialArchive
  editorialArchives(where: editorialArchiveFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): editorialArchivePage!
  swarmState(id: String!): swarmState
  swarmStates(where: swarmStateFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): swarmStatePage!
  traderState(id: String!): traderState
  traderStates(where: traderStateFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): traderStatePage!
  agentEvent(id: String!): agentEvent
  agentEvents(where: agentEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): agentEventPage!
  agentConsumerCursor(id: String!): agentConsumerCursor
  agentConsumerCursors(where: agentConsumerCursorFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): agentConsumerCursorPage!
  aiInvocation(id: String!): aiInvocation
  aiInvocations(where: aiInvocationFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int): aiInvocationPage!
  agentMemory(key: String!): agentMemory
