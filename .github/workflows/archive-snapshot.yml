name: Archive Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8,20 * * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Snapshot archive
        run: npm run archive:snapshot
        env:
          ARCHIVE_FEED_URL: https://pooter.world/api/feed

      - name: Generate editorials for new items
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: npm run editorial:generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDITORIAL_BATCH_SIZE: "5"

      - name: Commit if changed
        run: |
          cd ..
          CHANGED_FILES=""
          git diff --quiet -- web/src/data/article-archive.json || CHANGED_FILES="web/src/data/article-archive.json"
          git diff --quiet -- web/src/data/editorial-archive.json || CHANGED_FILES="$CHANGED_FILES web/src/data/editorial-archive.json"

          if [ -z "$CHANGED_FILES" ]; then
            echo "No archive updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $CHANGED_FILES
          git commit -m "chore(archive): snapshot + editorials $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
