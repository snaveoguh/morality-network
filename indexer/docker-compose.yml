version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pooter_indexer
      POSTGRES_USER: pooter
      POSTGRES_PASSWORD: pooter_local
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pooter -d pooter_indexer"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
